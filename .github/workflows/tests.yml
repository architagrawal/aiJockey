name: tests

on:
  push:
    branches: ['**']
  pull_request:

# Cancel in-flight runs of the same branch when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install minimal deps for laptop-CI tests
        run: |
          # No torch / transformers / demucs — we use the import-resolution
          # smoke test which gracefully skips third-party-dep modules.
          python -m pip install --upgrade pip
          pip install pytest numpy
          # First-party laptop-CI requirements (light deps used by
          # test fixtures): no torch needed for the 4 covered tests.

      - name: Run unit tests + import-resolution smoke
        env:
          # Force Phase 1 vocab so test fixtures match constitutional rules.
          AIJOCKEY_PHASE: '1'
        run: |
          python -m pytest \
              tests/test_constitutional.py \
              tests/test_phrase_quantize.py \
              tests/test_transition_mapping.py \
              tests/test_imports_resolve.py \
              -v --tb=short

      - name: Smoke-check probe_log + improver entrypoints
        run: |
          # Ensure CLI entrypoints don't crash on import.
          python -c "import sys; sys.path.insert(0, 'src'); import probe_log; import improver; import audio_probes; import tempo_octave; print('OK')"
